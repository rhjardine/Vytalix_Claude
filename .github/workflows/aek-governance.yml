name: AEK Architecture Governance

on:
  pull_request:
    branches:
      - main
      - 'adr/**'
  push:
    branches:
      - main
      - 'adr/**'

jobs:
  architecture-gate:
    name: Architecture Gate (AEK)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install AEK dependencies
        run: pnpm install
        working-directory: tools/aek

      - name: Run Architecture Gate
        run: pnpm aek:check
