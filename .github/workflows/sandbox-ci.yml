name: Disglobal Sandbox CI

on:
  pull_request:
    branches:
      - main
      - 'adr/**'
  push:
    branches:
      - main
      - 'adr/**'

jobs:
  sandbox-test:
    name: Sandbox Tests (Disglobal Integration)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run sandbox tests
        run: pnpm sandbox:test
